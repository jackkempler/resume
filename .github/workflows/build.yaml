name: Render and Deploy Resume

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: sinanali/rendercv:latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Render CV
        run: |
          rendercv render resume.yaml
          mkdir out
          mv rendercv_output/*.pdf out/resume.pdf
          cp index.html out/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
